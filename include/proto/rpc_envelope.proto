syntax = "proto3";

package minirpc;

message RpcRequestProto {
    string service_name = 1;
    string method_name  = 2;
    uint32 sequence_id  = 3;
    bytes  payload      = 4;
}

message RpcResponseProto {
    uint32 error_code    = 1;
    string error_message = 2;
    bytes  result_data   = 3;
    uint32 sequence_id   = 4;
}
